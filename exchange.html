<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=1.0, user-scalable=no">
<title>专业模拟交易系统｜完整版</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
body{background:#0A0B10;color:#fff;font-size:14px}
a{text-decoration:none;color:inherit}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal-box{background:#131620;border-radius:12px;padding:24px;width:360px;border:1px solid #1e2434;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:0 0;border:0;color:#888;font-size:16px;cursor:pointer}
.hide{display:none!important}
.toast{position:fixed;top:70px;right:20px;padding:10px 16px;background:#131620;border-radius:8px;color:#fff;border-left:4px solid #407BFF;z-index:99999;transform:translateX(120%);transition:.3s}
.toast.show{transform:translateX(0)}
.toast.success{border-color:#02C076}
.toast.error{border-color:#F24B4B}
.nav{position:fixed;top:0;left:0;width:100%;height:60px;background:#131620;border-bottom:1px solid #1e2434;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:999}
.logo{font-size:22px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer}
.logo i{color:#407BFF}
.logo span{color:#407BFF}
.menu{display:flex;gap:26px;align-items:center}
.menu a{color:#e0e0e0;font-size:15px;padding:4px 8px;border-radius:4px;cursor:pointer}
.menu a:hover,.menu a.active{color:#407BFF;background:rgba(64,123,255,.1)}
.user{display:flex;gap:10px;align-items:center}
.user-info{display:none;align-items:center;gap:8px;color:#fff;background:#1c2333;padding:4px 12px;border-radius:20px}
.login-btn,.reg-btn{padding:8px 16px;border-radius:8px;font-size:14px;border:0;cursor:pointer}
.login-btn{background:0 0;border:1px solid #407BFF;color:#407BFF}
.reg-btn{background:#407BFF;color:#fff}
.container{max-width:1400px;margin:0 auto;padding:0 10px;margin-top:70px}
#homePage{display:block}
#tradePage{display:none}
.banner{height:360px;background:linear-gradient(90deg,#101420 0,#1a2236 50%,#25304b 100%);border-radius:16px;margin-bottom:30px;display:flex;align-items:center;padding:0 60px;position:relative}
.banner-text{position:relative;z-index:2}
.banner-text h1{font-size:40px;margin-bottom:16px;line-height:1.2;background:linear-gradient(90deg,#fff,#407BFF);-webkit-background-clip:text;background-clip:text;color:transparent}
.banner-text p{font-size:16px;color:#aaa;margin-bottom:24px;max-width:500px}
.trade-btn{padding:14px 28px;background:linear-gradient(90deg,#407BFF,#2962ff);color:#fff;border:0;border-radius:10px;font-size:16px;cursor:pointer;font-weight:600}
.section{margin-bottom:40px}
.section-title{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title i{color:#407BFF}
.card-box{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{background:#131620;border-radius:14px;padding:20px;border:1px solid #1e2434}
.go-trade{padding:10px 16px;background:#1c2333;color:#fff;border:1px solid #407BFF;border-radius:8px;width:100%;cursor:pointer}
.market{background:#131620;border-radius:14px;overflow:hidden;border:1px solid #1e2434}
.market-head{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:16px 20px;color:#888;border-bottom:1px solid #1e2434}
.market-item{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:16px 20px;border-top:1px solid #1e2434;align-items:center}
.coin{display:flex;align-items:center;gap:8px}
.up{color:#02C076}
.down{color:#F24B4B}
.pair-tab{display:flex;gap:8px;background:#131620;padding:10px 14px;border-radius:12px;margin-bottom:10px;border:1px solid #1e2434;flex-wrap:wrap}
.pair-tab button{padding:6px 12px;background:#1B1F2E;border:0;border-radius:8px;color:#ccc;cursor:pointer}
.pair-tab button.active{background:#407BFF;color:#fff}
.asset-box{background:#131620;border-radius:12px;padding:16px;margin:10px 0;border:1px solid #1e2434}
.asset-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e2434}
.asset-row:last-child{border-bottom:0}
.asset-label{color:#aaa;font-size:13px}
.asset-val{color:#407BFF;font-weight:500}
#recharge{margin-top:10px;width:100%;padding:10px;background:linear-gradient(90deg,#407BFF,#2962ff);border:0;border-radius:8px;color:#fff;font-weight:700;cursor:pointer}
.trade-container{display:grid;grid-template-columns:1fr 330px 390px;gap:10px}
@media(max-width:1200px){.trade-container{grid-template-columns:1fr 330px}}
@media(max-width:768px){.trade-container{grid-template-columns:1fr}.card-box{grid-template-columns:1fr}}
.kline-area{background:#131620;border-radius:12px;padding:12px;height:520px;border:1px solid #1e2434}
#kline{width:100%;height:100%}
.kline-toolbar{display:flex;gap:8px;margin-bottom:8px}
.kline-toolbar button{padding:4px 8px;background:#1c2333;border:0;border-radius:4px;color:#ccc;font-size:12px;cursor:pointer}
.kline-toolbar button.active{background:#407BFF;color:#fff}
.depth-order{display:flex;flex-direction:column;gap:10px}
.depth-box{background:#131620;border-radius:12px;padding:12px;height:250px;border:1px solid #1e2434}
.order-book{background:#131620;border-radius:12px;padding:12px;height:260px;overflow-y:auto;border:1px solid #1e2434}
.book-item{display:grid;grid-template-columns:1fr 1fr;font-size:12px;padding:4px 0;color:#aaa}
.book-item span:first-child{text-align:right;padding-right:8px}
.book-item span:last-child{text-align:left;padding-left:8px}
.bid{color:#02C076}
.ask{color:#F24B4B}
.book-middle{text-align:center;color:#407BFF;margin:6px 0;font-weight:700}
.trade-panel{background:#131620;border-radius:12px;padding:18px;border:1px solid #1e2434}
.trade-tab{display:flex;gap:6px;margin-bottom:14px}
.tab-btn{flex:1;padding:10px;background:#1B1F2E;border:0;border-radius:8px;color:#aaa;cursor:pointer}
.tab-btn.active{background:#407BFF;color:#fff}
.input-item{margin-bottom:12px}
.input-item label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;color:#aaa}
.input-item input,.input-item select{width:100%;padding:10px;background:#1B1F2E;border:1px solid #2a3347;border-radius:8px;color:#fff;outline:0}
.amount-btns{display:flex;gap:4px;margin-top:4px}
.amount-btns button{flex:1;padding:4px;background:#1B1F2E;border:1px solid #2a3347;border-radius:4px;color:#ccc;font-size:11px;cursor:pointer}
.btns{display:flex;gap:8px;margin-top:10px}
.btn-long{flex:1;padding:12px;background:linear-gradient(90deg,#02C076,#00a86b);border:0;border-radius:8px;color:#fff;font-weight:700;cursor:pointer}
.btn-short{flex:1;padding:12px;background:linear-gradient(90deg,#F24B4B,#e03e3e);border:0;border-radius:8px;color:#fff;font-weight:700;cursor:pointer}
.bottom-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
@media(max-width:768px){.bottom-wrap{grid-template-columns:1fr}}
.order-list,.position-list{background:#131620;border-radius:12px;padding:14px;max-height:320px;overflow-y:auto;border:1px solid #1e2434}
.list-title{margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:6px;color:#fff}
.list-title i{color:#407BFF}
.empty-tip{text-align:center;color:#888;font-size:13px;padding:40px 0}
.item{padding:10px 8px;border-bottom:1px solid #1B1F2E;font-size:12px;border-radius:6px;margin-bottom:4px;background:#1c2333}
.item:last-child{border-bottom:0;margin-bottom:0}
.item-header{display:flex;justify-content:space-between;margin-bottom:4px}
.item-type{color:#407BFF;font-weight:700}
.item-time{color:#888}
.item-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.item-body div{display:flex;justify-content:space-between}
.item-label{color:#aaa}
.item-value{color:#fff}
.item-profit{color:#02C076}
.item-loss{color:#F24B4B}
.item button{float:right;background:#407BFF;border:0;border-radius:4px;padding:3px 8px;color:#fff;font-size:11px;cursor:pointer}
.order-filter{display:flex;gap:6px;margin-bottom:8px}
.order-filter button{padding:4px 8px;background:#1c2333;border:0;border-radius:4px;color:#ccc;font-size:12px;cursor:pointer}
.order-filter button.active{background:#407BFF;color:#fff}
</style>
</head>
<body>

<div class="nav">
  <div class="logo" onclick="goHome()"><i class="bi bi-currency-bitcoin"></i>模拟<span>交易</span></div>
  <div class="menu">
    <a onclick="goHome()" class="active">首页</a>
    <a onclick="goTrade()">币币</a>
    <a onclick="goTrade()">合约</a>
    <a onclick="goTrade()">行情</a>
  </div>
  <div class="user">
    <div class="user-info" id="userInfo"><span id="usernameDisplay"></span><button onclick="logout()"><i class="bi bi-box-arrow-right"></i></button></div>
    <button class="login-btn" id="openLogin">登录</button>
    <button class="reg-btn" id="openReg">注册</button>
  </div>
</div>

<div id="homePage" class="container">
  <div class="banner">
    <div class="banner-text">
      <h1>专业模拟交易系统<br>零风险练手</h1>
      <p>实时K线、杠杆合约、止盈止损、深度盘口、仓位管理，注册即送10000 USDT模拟金</p>
      <button class="trade-btn" onclick="goTrade()">开始交易</button>
    </div>
  </div>
  <div class="section">
    <div class="section-title"><i class="bi bi-grid-1x2-fill"></i>交易产品</div>
    <div class="card-box">
      <div class="card"><h3><i class="bi bi-currency-exchange"></i>现货交易</h3><p>实时盘口、零成本练习、BTC/ETH/SOL</p><button class="go-trade" onclick="goTrade()">现货交易</button></div>
      <div class="card"><h3><i class="bi bi-graph-up"></i>永续合约</h3><p>1-100倍杠杆、多空、止盈止损、强平</p><button class="go-trade" onclick="goTrade()">合约交易</button></div>
      <div class="card"><h3><i class="bi bi-person-learning"></i>新手练习</h3><p>免费模拟资金，真实交易所体验</p><button class="go-trade" onclick="goTrade()">立即练习</button></div>
    </div>
  </div>
</div>

<div id="tradePage" class="container">
  <div class="pair-tab">
    <button class="active" data-p="BTC">BTC/USDT</button>
    <button data-p="ETH">ETH/USDT</button>
    <button data-p="SOL">SOL/USDT</button>
  </div>

  <div class="asset-box">
    <div class="asset-row"><span class="asset-label">总资产</span><span id="total" class="asset-val">0.00</span></div>
    <div class="asset-row"><span class="asset-label">可用</span><span id="avail" class="asset-val">0.00</span></div>
    <div class="asset-row"><span class="asset-label">未实现盈亏</span><span id="pnl" class="asset-val">0.00</span></div>
    <div class="asset-row"><span class="asset-label">预估强平价</span><span id="liq" class="asset-val">--</span></div>
    <button id="recharge"><i class="bi bi-wallet-fill"></i> 领取 10000 USDT</button>
  </div>

  <div class="trade-container">
    <div class="kline-area">
      <div class="kline-toolbar">
        <button class="kperiod active" data-p="1m">分时</button>
        <button class="kperiod" data-p="1m">1分</button>
        <button class="kperiod" data-p="5m">5分</button>
        <button class="kperiod" data-p="15m">15分</button>
        <button class="kperiod" data-p="1h">1小时</button>
        <button class="kperiod" data-p="4h">4小时</button>
        <button class="kperiod" data-p="1d">日线</button>
      </div>
      <div id="kline"></div>
    </div>

    <div class="depth-order">
      <div class="depth-box"><div id="depth"></div></div>
      <div class="order-book"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>盘口</span><span id="showPrice">0.00</span></div><div id="book"></div></div>
    </div>

    <div class="trade-panel">
      <div class="trade-tab">
        <button class="tab-btn active" data-m="spot">现货</button>
        <button class="tab-btn" data-m="contract">合约</button>
      </div>
      <div class="input-item"><label><span>价格</span></label><input type="number" id="price" readonly></div>
      <div class="input-item"><label><span>数量</span></label><input type="number" id="amount" value="0.001" step="0.001" min="0.001">
        <div class="amount-btns">
          <button onclick="setAmt(0.001)">0.001</button>
          <button onclick="setAmt(0.01)">0.01</button>
          <button onclick="setAmt(0.1)">0.1</button>
          <button onclick="setAmt(1)">1</button>
          <button onclick="setAmt('max')">全部</button>
        </div>
      </div>
      <div class="input-item" id="levBox" style="display:none"><label><span>杠杆</span></label>
        <select id="lev"><option>1</option><option>5</option><option>10</option><option>20</option><option>50</option><option>100</option></select>
      </div>
      <div class="input-item" id="tpBox" style="display:none"><label><span>止盈价</span></label><input type="number" id="tp" placeholder="不填则不止盈"></div>
      <div class="input-item" id="slBox" style="display:none"><label><span>止损价</span></label><input type="number" id="sl" placeholder="不填则不止损"></div>
      <div class="btns">
        <button class="btn-long" id="buy">买入 / 开多</button>
        <button class="btn-short" id="sell">卖出 / 开空</button>
      </div>
    </div>
  </div>

  <div class="bottom-wrap">
    <div class="order-list">
      <div class="list-title"><i class="bi bi-list-check"></i>订单记录</div>
      <div class="order-filter">
        <button class="ofbtn active" data-t="all">全部</button>
        <button class="ofbtn" data-t="order">委托</button>
        <button class="ofbtn" data-t="trade">成交</button>
        <button class="ofbtn" data-t="close">平仓</button>
      </div>
      <div id="orders" class="empty-tip">暂无订单</div>
    </div>
    <div class="position-list">
      <div class="list-title"><i class="bi bi-briefcase-fill"></i>当前持仓</div>
      <div id="positions" class="empty-tip">暂无持仓</div>
    </div>
  </div>
</div>

<div class="modal hide" id="loginModal">
  <div class="modal-box"><button class="modal-close" onclick="closeM('loginModal')"><i class="bi bi-x-lg"></i></button>
    <h3><i class="bi bi-box-arrow-in-right"></i>登录</h3>
    <input id="luser" placeholder="账号">
    <input id="lpwd" type="password" placeholder="密码">
    <button id="loginGo">登录</button>
  </div>
</div>

<div class="modal hide" id="regModal">
  <div class="modal-box"><button class="modal-close" onclick="closeM('regModal')"><i class="bi bi-x-lg"></i></button>
    <h3><i class="bi bi-person-add"></i>注册</h3>
    <input id="ruser" placeholder="设置账号">
    <input id="rpwd" type="password" placeholder="设置密码">
    <button id="regGo">注册</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let user=null;
let coin={BTC:70200,ETH:3780,SOL:118};
let ccoin="BTC",cprice=coin[ccoin];
let mode="spot";
let klineChart,depthChart;
let autoUpdate=null;

function goHome(){document.getElementById("homePage").style.display="block";document.getElementById("tradePage").style.display="none"}
function goTrade(){if(!user){toastShow("请先登录","error");openM("loginModal");return}
document.getElementById("homePage").style.display="none";document.getElementById("tradePage").style.display="block";initAll()}

function openM(id){document.getElementById(id).classList.remove("hide")}
function closeM(id){document.getElementById(id).classList.add("hide")}
function toastShow(msg,t="info"){const tdom=document.getElementById("toast");tdom.className="toast";if(t=="success")tdom.classList.add("success");if(t=="error")tdom.classList.add("error");tdom.textContent=msg;tdom.classList.add("show");setTimeout(()=>tdom.classList.remove("show"),3000)}

function loadUser(){const d=localStorage.getItem("trade_user");if(d){user=JSON.parse(d);renderUser()}}
function saveUser(){if(user)localStorage.setItem("trade_user",JSON.stringify(user))}
function renderUser(){if(user){document.getElementById("userInfo").style.display="flex";document.getElementById("usernameDisplay").textContent=user.user;document.getElementById("openLogin").style.display="none";document.getElementById("openReg").style.display="none"}else{document.getElementById("userInfo").style.display="none";document.getElementById("openLogin").style.display="block";document.getElementById("openReg").style.display="block"}}
function logout(){user=null;localStorage.removeItem("trade_user");renderUser();goHome();toastShow("已退出登录","info")}

document.getElementById("regGo").onclick=()=>{const u=document.getElementById("ruser").value.trim();const p=document.getElementById("rpwd").value.trim();if(!u||!p||u.length<3||p.length<4){toastShow("账号≥3位，密码≥4位","error");return}
user={user:u,pwd:p,money:10000,orders:[],positions:[],tp:[],sl:[]};saveUser();renderUser();closeM("regModal");toastShow("注册成功，赠送10000 USDT","success")}

document.getElementById("loginGo").onclick=()=>{const u=document.getElementById("luser").value.trim();const p=document.getElementById("lpwd").value.trim();if(!u||!p){toastShow("请输入账号密码","error");return}
const d=localStorage.getItem("trade_user");if(!d){toastShow("账号不存在","error");return}
const j=JSON.parse(d);if(j.user!=u||j.pwd!=p){toastShow("账号或密码错误","error");return}
user=j;saveUser();renderUser();closeM("loginModal");toastShow("欢迎回来","success")}

document.getElementById("recharge").onclick=()=>{if(!user){toastShow("请登录","error");return}
user.money+=10000;saveUser();refresh();toastShow("领取成功 10000 USDT","success")}

function initAll(){if(klineChart)return;
klineChart=echarts.init(document.getElementById("kline"));depthChart=echarts.init(document.getElementById("depth"));
drawK();drawDepth();refresh();startAuto()}

function setAmt(v){const a=document.getElementById("amount");if(v=="max"&&user){const lv=mode=="contract"?+document.getElementById("lev").value:1;a.value=Math.max(0.001,(user.money*lv/cprice).toFixed(3))}else a.value=v}

document.querySelectorAll(".tab-btn").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");mode=b.dataset.m;
document.getElementById("levBox").style.display=mode=="contract"?"block":"none";
document.getElementById("tpBox").style.display=mode=="contract"?"block":"none";
document.getElementById("slBox").style.display=mode=="contract"?"block":"none"}}})

document.querySelectorAll(".pair-tab button").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".pair-tab button").forEach(x=>x.classList.remove("active"));b.classList.add("active");ccoin=b.dataset.p;cprice=coin[ccoin];drawK();drawDepth();refresh()}})

document.querySelectorAll(".kperiod").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".kperiod").forEach(x=>x.classList.remove("active"));b.classList.add("active");drawK()}})

function drawK(){const data=[];const t=Date.now();for(let i=100;i>=0;i--){const bp=cprice+(Math.random()-.5)*200;const o=bp;const h=o+Math.random()*150;const l=o-Math.random()*150;const c=o+(Math.random()-.5)*80;data.push([t-i*60000,o,h,l,c])}
klineChart.setOption({backgroundColor:"transparent",grid:{left:10,right:10,top:10,bottom:10},xAxis:{type:"time",axisLine:{lineStyle:{color:"#2a3347"}},axisLabel:{color:"#888"}},yAxis:{scale:!0,axisLine:{lineStyle:{color:"#2a3347"}},axisLabel:{color:"#888"},splitLine:{lineStyle:{color:"#1e2434"}}},series:[{type:"candlestick",data,itemStyle:{color:"#02C076",color0:"#F24B4B"}}]})}

function drawDepth(){const bids=[],asks=[];for(let i=1;i<=10;i++){bids.push([(cprice-i*20).toFixed(1),(Math.random()*.5+.1).toFixed(3)]);asks.push([(cprice+i*20).toFixed(1),(Math.random()*.5+.1).toFixed(3)])}
depthChart.setOption({backgroundColor:"transparent",grid:{left:5,right:5,top:5,bottom:5},xAxis:{type:"value",axisLine:{lineStyle:{color:"#2a3347"}},axisLabel:{color:"#888"}},yAxis:{type:"value",axisLine:{lineStyle:{color:"#2a3347"}},axisLabel:{color:"#888"}},series:[{type:"bar",data:bids,itemStyle:{color:"#02C076"}},{type:"bar",data:asks,itemStyle:{color:"#F24B4B"}}]});
let h="";bids.reverse().forEach(x=>{h+=`<div class="book-item"><span class="bid">${x[0]}</span><span>${x[1]}</span></div>`});h+=`<div class="book-middle">${cprice.toFixed(0)}</div>`;asks.forEach(x=>{h+=`<div class="book-item"><span class="ask">${x[0]}</span><span>${x[1]}</span></div>`});
document.getElementById("book").innerHTML=h;document.getElementById("showPrice").textContent=cprice.toFixed(2);document.getElementById("price").value=cprice.toFixed(2)}

function refresh(){if(!user)return;
let pnl=0;user.positions.forEach(p=>{pnl+=p.dir=="long"?(cprice-p.price)*p.amount*p.lev:(p.price-cprice)*p.amount*p.lev});
document.getElementById("avail").textContent=user.money.toFixed(2);
document.getElementById("pnl").textContent=pnl.toFixed(2);
document.getElementById("total").textContent=(user.money+pnl).toFixed(2);
document.getElementById("liq").textContent=user.positions.length?(cprice*.65).toFixed(0):"--";
renderOrders();renderPos()}

function renderPos(){if(!user||!user.positions.length){document.getElementById("positions").innerHTML='<div class="empty-tip">暂无持仓</div>';return}
let h="";user.positions.forEach((p,i)=>{const pl=p.dir=="long"?(cprice-p.price)*p.amount*p.lev:(p.price-cprice)*p.amount*p.lev;const cls=pl>=0?"item-profit":"item-loss";
h+=`<div class="item"><div class="item-header"><span class="item-type">${p.dir=="long"?"多仓":"空仓"}</span><span>开仓价 ${p.price.toFixed(2)}</span></div><div class="item-body"><div><span class="item-label">数量:</span><span class="item-value">${p.amount}</span></div><div><span class="item-label">杠杆:</span><span class="item-value">${p.lev}x</span></div><div><span class="item-label">盈亏:</span><span class="${cls}">${pl.toFixed(2)}</span></div></div><button onclick="closePos(${i})">平仓</button></div>`});
document.getElementById("positions").innerHTML=h}

function closePos(i){if(!user)return;const p=user.positions[i];user.money+=p.amount*p.price/p.lev+(p.dir=="long"?(cprice-p.price)*p.amount*p.lev:(p.price-cprice)*p.amount*p.lev);
user.orders.unshift({type:"平仓",dir:p.dir,amount:p.amount,price:cprice,time:new Date().toLocaleTimeString()});
user.positions.splice(i,1);saveUser();refresh();toastShow("平仓成功","success")}

let filterType="all";
document.querySelectorAll(".ofbtn").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".ofbtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");filterType=b.dataset.t;renderOrders()}})

function renderOrders(){if(!user||!user.orders.length){document.getElementById("orders").innerHTML='<div class="empty-tip">暂无订单</div>';return}
let list=user.orders;if(filterType=="order")list=user.orders.filter(o=>o.type=="委托");
if(filterType=="trade")list=user.orders.filter(o=>o.type=="成交");
if(filterType=="close")list=user.orders.filter(o=>o.type=="平仓");
if(!list.length){document.getElementById("orders").innerHTML='<div class="empty-tip">无数据</div>';return}
let h="";list.forEach(o=>{h+=`<div class="item"><div class="item-header"><span class="item-type">${o.type} ${o.dir}</span><span class="item-time">${o.time}</span></div><div class="item-body"><div><span class="item-label">数量:</span><span class="item-value">${o.amount}</span></div><div><span class="item-label">价格:</span><span class="item-value">${o.price.toFixed(2)}</span></div></div></div>`});
document.getElementById("orders").innerHTML=h}

document.getElementById("buy").onclick=()=>trade("long")
document.getElementById("sell").onclick=()=>trade("short")

function trade(dir){if(!user){toastShow("请登录","error");return}
const amt=+document.getElementById("amount").value;const lv=mode=="contract"?+document.getElementById("lev").value:1;const tp=+document.getElementById("tp").value||0;const sl=+document.getElementById("sl").value||0;
if(isNaN(amt)||amt<0.001){toastShow("数量≥0.001","error");return}
const need=mode=="contract"?amt*cprice/lv:amt*cprice;if(user.money<need){toastShow("余额不足","error");return}
user.money-=need;
if(mode=="contract"){user.positions.push({dir,amount:amt,price:cprice,lev:lv});if(tp>0)user.tp.push({dir,price:tp,amount:amt,pos:user.positions.length-1});if(sl>0)user.sl.push({dir,price:sl,amount:amt,pos:user.positions.length-1})}
user.orders.unshift({type:mode=="contract"?"成交":"现货",dir:dir,amount:amt,price:cprice,time:new Date().toLocaleTimeString()});
saveUser();refresh();toastShow("下单成功","success")}

function startAuto(){if(autoUpdate)clearInterval(autoUpdate);autoUpdate=setInterval(()=>{cprice+=(Math.random()-.5)*50;drawK();drawDepth();refresh()},3000)}

window.onresize=()=>{if(klineChart)klineChart.resize();if(depthChart)depthChart.resize()}
document.getElementById("openLogin").onclick=()=>openM("loginModal")
document.getElementById("openReg").onclick=()=>openM("regModal")
window.onload=loadUser
</script>
</body>
</html>
