<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>模拟交易所</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{background:#111318;color:#e6e6e6}
.container{max-width:1200px;margin:0 auto;padding:12px}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #2a2e3d}
.logo{font-size:20px;font-weight:700;color:#3b82f6}
.user-area button{margin-left:8px;padding:6px 10px;background:#1e293b;border:1px solid #374151;border-radius:6px;color:#fff;cursor:pointer}

.main{display:grid;grid-template-columns:1fr 360px;gap:12px;margin-top:12px}
.kline-box{background:#1e293b;border-radius:10px;padding:12px;height:500px}
#kline{width:100%;height:100%}

.trade-panel{background:#1e293b;border-radius:10px;padding:12px}
.tab{display:flex;gap:4px;margin-bottom:10px}
.tab button{flex:1;padding:8px;background:#2a2e3d;border:none;color:#ccc;border-radius:6px;cursor:pointer}
.tab button.active{background:#3b82f6;color:#fff}
.input-group{margin-bottom:10px}
.input-group label{display:block;margin-bottom:4px;font-size:14px;color:#aaa}
.input-group input,.input-group select{width:100%;padding:10px;background:#2a2e3d;border:1px solid #374151;border-radius:6px;color:#fff}
.trade-btn{display:flex;gap:8px;margin-top:10px}
.buy{flex:1;padding:10px;background:#10b981;border:none;border-radius:6px;color:#fff;font-weight:700;cursor:pointer}
.sell{flex:1;padding:10px;background:#ef4444;border:none;border-radius:6px;color:#fff;font-weight:700;cursor:pointer}

.asset{background:#1e293b;border-radius:10px;padding:12px;margin-top:12px}
.asset-row{display:flex;justify-content:space-between;margin:6px 0}
#recharge{margin-top:8px;padding:8px;background:#3b82f6;border:none;border-radius:6px;color:#fff;cursor:pointer}

.order-box{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.order-list,.position-list{background:#1e293b;border-radius:10px;padding:12px;max-height:320px;overflow:auto}
.title{font-weight:700;margin-bottom:8px}
.item{padding:8px;border-bottom:1px solid #2a2e3d;font-size:13px}
.item button{float:right;background:#3b82f6;border:none;border-radius:4px;padding:2px 6px;color:#fff;font-size:12px;cursor:pointer}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:99}
.modal-box{background:#1e293b;padding:24px;border-radius:10px;width:340px}
.modal-box input{width:100%;margin:6px 0;padding:10px;background:#2a2e3d;border:1px solid #374151;border-radius:6px;color:#fff}
.modal-box button{width:100%;padding:10px;background:#3b82f6;border:none;border-radius:6px;color:#fff;margin-top:10px}
.hide{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">模拟交易所</div>
    <div class="user-area">
      <span id="userInfo">未登录</span>
      <button id="regBtn">注册</button>
      <button id="loginBtn">登录</button>
      <button id="logoutBtn" class="hide">退出</button>
    </div>
  </div>

  <div class="asset">
    <div class="asset-row"><span>总资产(USDT)</span><span id="total">0.00</span></div>
    <div class="asset-row"><span>可用</span><span id="available">0.00</span></div>
    <div class="asset-row"><span>持仓盈亏</span><span id="pnl">0.00</span></div>
    <button id="recharge">模拟充值 10000 USDT</button>
  </div>

  <div class="main">
    <div class="kline-box"><div id="kline"></div></div>
    <div class="trade-panel">
      <div class="tab">
        <button class="active" data-mode="spot">现货</button>
        <button data-mode="contract">合约</button>
      </div>
      <div class="input-group">
        <label>当前价格</label>
        <input type="number" id="price" readonly>
      </div>
      <div class="input-group">
        <label>交易数量</label>
        <input type="number" id="amount" value="0.001" step="0.001" min="0.0001">
      </div>
      <div class="input-group" id="levGroup" style="display:none">
        <label>杠杆倍数</label>
        <select id="lev">
          <option>1</option><option>5</option><option>10</option><option>20</option>
        </select>
      </div>
      <div class="trade-btn">
        <button class="buy" id="buyBtn">买入 / 开多</button>
        <button class="sell" id="sellBtn">卖出 / 开空</button>
      </div>
    </div>
  </div>

  <div class="order-box">
    <div class="order-list">
      <div class="title">订单记录</div>
      <div id="orders"></div>
    </div>
    <div class="position-list">
      <div class="title">持仓（可平仓）</div>
      <div id="positions"></div>
    </div>
  </div>
</div>

<div class="modal hide" id="regModal">
  <div class="modal-box">
    <h3>注册</h3>
    <input id="regUser" placeholder="账号">
    <input id="regPwd" placeholder="密码" type="password">
    <button id="doReg">注册</button>
  </div>
</div>

<div class="modal hide" id="loginModal">
  <div class="modal-box">
    <h3>登录</h3>
    <input id="loginUser" placeholder="账号">
    <input id="loginPwd" placeholder="密码" type="password">
    <button id="doLogin">登录</button>
  </div>
</div>

<script>
let user = null
let price = 70000
let mode = 'spot'
const myChart = echarts.init(document.getElementById('kline'))
let kdata = []

function initK() {
  let now = Date.now()
  for (let i = 0; i < 60; i++) {
    let p = 70000 + (Math.random() - 0.5) * 2000
    kdata.push([now - (60 - i) * 60000, p, p + 200, p - 200, p + 100])
  }
  renderK()
}

function renderK() {
  myChart.setOption({
    grid: { left: 10, right: 10, top: 10, bottom: 10 },
    xAxis: { type: 'time' },
    yAxis: { scale: true },
    series: [{ type: 'candlestick', data: kdata }]
  })
}

function autoUpdatePrice() {
  price = Math.max(62000, Math.min(78000, price + (Math.random() - 0.5) * 600))
  document.getElementById('price').value = price.toFixed(2)
  kdata.push([Date.now(), price, price + 150, price - 150, price + 50])
  if (kdata.length > 100) kdata.shift()
  renderK()
  calcPnl()
  refresh()
}

function loadUser() {
  let u = localStorage.getItem('sim_user')
  if (u) {
    user = JSON.parse(u)
    refresh()
  }
}

function saveUser() {
  localStorage.setItem('sim_user', JSON.stringify(user))
}

function refresh() {
  if (!user) return
  document.getElementById('userInfo').innerText = user.username
  document.getElementById('available').innerText = user.asset.available.toFixed(2)
  calcPnl()
  renderOrders()
  renderPositions()
}

function calcPnl() {
  if (!user) return
  let totalPnl = 0
  user.positions.forEach(p => {
    let pl = 0
    if (p.dir === 'long') pl = (price - p.price) * p.amount * p.lev
    if (p.dir === 'short') pl = (p.price - price) * p.amount * p.lev
    p.pnl = pl
    totalPnl += pl
  })
  user.pnl = totalPnl
  document.getElementById('pnl').innerText = totalPnl.toFixed(2)
  document.getElementById('total').innerText = (user.asset.available + totalPnl).toFixed(2)
}

function renderOrders() {
  let dom = document.getElementById('orders')
  dom.innerHTML = user.orders.map((o, i) => `
  <div class="item">${o.time}<br>${o.type} ${o.dir} ${o.amount}BTC<br>@${o.price}</div>
  `).join('')
}

function renderPositions() {
  let dom = document.getElementById('positions')
  dom.innerHTML = user.positions.map((p, i) => `
  <div class="item">
    ${p.dir} ${p.amount}BTC<br>
    杠杆${p.lev}x | 盈亏${p.pnl.toFixed(2)}
    <button onclick="closePos(${i})">平仓</button>
  </div>
  `).join('')
}

function closePos(index) {
  if (!user) return
  let p = user.positions[index]
  user.asset.available += p.amount * p.price / p.lev + p.pnl
  user.orders.unshift({
    time: new Date().toLocaleTimeString(),
    type: '平仓',
    dir: p.dir,
    amount: p.amount,
    price: price
  })
  user.positions.splice(index, 1)
  saveUser()
  refresh()
}

document.getElementById('recharge').onclick = () => {
  if (!user) return alert('请先登录')
  user.asset.available += 10000
  saveUser()
  refresh()
}

document.querySelectorAll('.tab button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.tab button').forEach(x => x.classList.remove('active'))
    b.classList.add('active')
    mode = b.dataset.mode
    document.getElementById('levGroup').style.display = mode === 'contract' ? 'block' : 'none'
  }
})

document.getElementById('regBtn').onclick = () => {
  document.getElementById('regModal').classList.remove('hide')
}
document.getElementById('loginBtn').onclick = () => {
  document.getElementById('loginModal').classList.remove('hide')
}

document.getElementById('doReg').onclick = () => {
  let u = document.getElementById('regUser').value.trim()
  let p = document.getElementById('regPwd').value.trim()
  if (!u || !p) return alert('请输入完整')
  user = {
    username: u, pwd: p,
    asset: { available: 10000 },
    orders: [], positions: [], pnl: 0
  }
  saveUser()
  alert('注册成功')
  document.getElementById('regModal').classList.add('hide')
  refresh()
}

document.getElementById('doLogin').onclick = () => {
  let u = document.getElementById('loginUser').value.trim()
  let p = document.getElementById('loginPwd').value.trim()
  let local = localStorage.getItem('sim_user')
  if (!local) return alert('未找到账号')
  let lu = JSON.parse(local)
  if (lu.username === u && lu.pwd === p) {
    user = lu
    alert('登录成功')
    document.getElementById('loginModal').classList.add('hide')
    refresh()
  } else {
    alert('账号或密码错误')
  }
}

document.getElementById('logoutBtn').onclick = () => {
  user = null
  localStorage.removeItem('sim_user')
  document.getElementById('userInfo').innerText = '未登录'
}

document.getElementById('buyBtn').onclick = () => {
  if (!user) return alert('请登录')
  let amt = +document.getElementById('amount').value
  if (amt <= 0) return alert('数量无效')
  let lev = mode === 'contract' ? +document.getElementById('lev').value : 1
  let cost = price * amt / lev
  if (user.asset.available < cost) return alert('余额不足')
  user.asset.available -= cost
  user.orders.unshift({
    time: new Date().toLocaleTimeString(),
    type: mode === 'spot' ? '现货' : '合约',
    dir: '多',
    amount: amt,
    price: price
  })
  user.positions.push({
    dir: 'long', amount: amt, price: price, lev: lev, pnl: 0
  })
  saveUser()
  refresh()
}

document.getElementById('sellBtn').onclick = () => {
  if (!user) return alert('请登录')
  let amt = +document.getElementById('amount').value
  if (amt <= 0) return alert('数量无效')
  let lev = mode === 'contract' ? +document.getElementById('lev').value : 1
  let cost = price * amt / lev
  if (user.asset.available < cost) return alert('余额不足')
  user.asset.available -= cost
  user.orders.unshift({
    time: new Date().toLocaleTimeString(),
    type: mode === 'spot' ? '现货' : '合约',
    dir: '空',
    amount: amt,
    price: price
  })
  user.positions.push({
    dir: 'short', amount: amt, price: price, lev: lev, pnl: 0
  })
  saveUser()
  refresh()
}

initK()
loadUser()
setInterval(autoUpdatePrice, 3000)
window.onresize = () => myChart.resize()
</script>
</body>
</html>
