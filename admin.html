
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 唐老板</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* 登录页 */
        .login-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
        }

        .login-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5);
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            display: block;
        }

        /* 后台布局 */
        .admin-layout {
            display: none;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .nav-item .icon {
            font-size: 20px;
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-small {
            width: auto;
            padding: 8px 20px;
            font-size: 14px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .stat-card h3 {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-change {
            font-size: 14px;
            color: var(--success);
            margin-top: 8px;
        }

        /* 数据表格 */
        .data-table {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-muted);
        }

        .table-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .hidden {
            display: none !important;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h1>🔐 后台管理登录</h1>
            <div id="loginMessage" class="message"></div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>管理员邮箱</label>
                    <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="adminPassword" placeholder="输入密码" required>
                </div>
                <button type="submit" class="btn">登录</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px;">
                提示：请使用管理员账号登录
            </p>
        </div>
    </div>

    <!-- 后台管理界面 -->
    <div id="adminPanel" class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎛️ 管理后台</h2>
            </div>
            <nav>
                <div class="nav-item active" onclick="showSection('dashboard')">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </div>
                <div class="nav-item" onclick="showSection('users')">
                    <span class="icon">👥</span>
                    <span>用户管理</span>
                </div>
                <div class="nav-item" onclick="showSection('messages')">
                    <span class="icon">💬</span>
                    <span>留言管理</span>
                </div>
                <div class="nav-item" onclick="showSection('settings')">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1 id="pageTitle">数据概览</h1>
                <div class="user-info">
                    <span id="adminEmail"></span>
                    <button class="btn btn-small" onclick="logout()">退出</button>
                </div>
            </div>

            <!-- 数据概览 -->
            <div id="dashboardSection" class="section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>总用户数</h3>
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-change">↑ 较上月增长</div>
                    </div>
                    <div class="stat-card">
                        <h3>今日新增</h3>
                        <div class="stat-value" id="todayUsers">0</div>
                        <div class="stat-change">实时更新</div>
                    </div>
                    <div class="stat-card">
                        <h3>留言数量</h3>
                        <div class="stat-value" id="totalMessages">0</div>
                        <div class="stat-change">待处理 <span id="pendingMessages">0</span></div>
                    </div>
                    <div class="stat-card">
                        <h3>访问量</h3>
                        <div class="stat-value">1,234</div>
                        <div class="stat-change">今日PV</div>
                    </div>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="usersSection" class="section hidden">
                <h2 class="section-title">注册用户列表</h2>
                <div class="data-table">
                    <div class="table-header">
                        <div>邮箱</div>
                        <div>注册时间</div>
                        <div>状态</div>
                        <div>操作</div>
                    </div>
                    <div id="usersList">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>

            <!-- 留言管理 -->
            <div id="messagesSection" class="section hidden">
                <h2 class="section-title">用户留言</h2>
                <div class="data-table">
                    <div class="table-header">
                        <div>用户</div>
                        <div>主题</div>
                        <div>时间</div>
                        <div>状态</div>
                    </div>
                    <div id="messagesList">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>

            <!-- 系统设置 -->
            <div id="settingsSection" class="section hidden">
                <h2 class="section-title">系统设置</h2>
                <div class="data-table" style="padding: 20px;">
                    <p style="color: var(--text-muted);">设置功能开发中...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Firebase 配置（与主站相同）
        const firebaseConfig = {
            apiKey: "AIzaSyBQGBmwoKpiPIEGougRDjBDzxQyipbHHBM",
            authDomain: "tanglaoban-site-6a782.firebaseapp.com",
            projectId: "tanglaoban-site-6a782",
            storageBucket: "tanglaoban-site-6a782.firebasestorage.app",
            messagingSenderId: "372272969372",
            appId: "1:372272969372:web:420654e1de4354782c5f59"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 检查登录状态
        auth.onAuthStateChanged((user) => {
            if (user) {
                // 验证是否为管理员（简单检查邮箱）
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPanel').style.display = 'flex';
                document.getElementById('adminEmail').textContent = user.email;
                loadDashboard();
            } else {
                document.getElementById('loginPage').classList.remove('hidden');
                document.getElementById('adminPanel').style.display = 'none';
            }
        });

        // 管理员登录
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const msg = document.getElementById('loginMessage');

            auth.signInWithEmailAndPassword(email, password)
                .catch((error) => {
                    msg.textContent = '登录失败：' + error.message;
                    msg.classList.add('error');
                });
        });

        // 退出
        function logout() {
            auth.signOut();
        }

        // 切换页面
        function showSection(section) {
            // 隐藏所有 section
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            // 显示选中 section
            if (section === 'dashboard') {
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('pageTitle').textContent = '数据概览';
                loadDashboard();
            } else if (section === 'users') {
                document.getElementById('usersSection').classList.remove('hidden');
                document.getElementById('pageTitle').textContent = '用户管理';
                loadUsers();
            } else if (section === 'messages') {
                document.getElementById('messagesSection').classList.remove('hidden');
                document.getElementById('pageTitle').textContent = '留言管理';
                loadMessages();
            } else if (section === 'settings') {
                document.getElementById('settingsSection').classList.remove('hidden');
                document.getElementById('pageTitle').textContent = '系统设置';
            }

            event.target.classList.add('active');
        }

        // 加载统计数据
        async function loadDashboard() {
            // 获取用户数量（需要从 Firebase Auth 获取，这里模拟）
            document.getElementById('totalUsers').textContent = '12';
            document.getElementById('todayUsers').textContent = '2';
            document.getElementById('totalMessages').textContent = '5';
            document.getElementById('pendingMessages').textContent = '3';
        }

        // 加载用户列表
        async function loadUsers() {
            const list = document.getElementById('usersList');
            list.innerHTML = `
                <div class="table-row">
                    <div>tanglaoban0@gmail.com</div>
                    <div>2024-03-17</div>
                    <div><span class="status-badge status-active">正常</span></div>
                    <div><button class="btn btn-small">查看</button></div>
                </div>
            `;
        }

        // 加载留言列表
        async function loadMessages() {
            const list = document.getElementById('messagesList');
            list.innerHTML = `
                <div class="table-row">
                    <div>张三</div>
                    <div>商务合作</div>
                    <div>2024-03-17</div>
                    <div><span class="status-badge status-pending">待处理</span></div>
                </div>
            `;
        }
    </script>
</body>
</html>
