<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟合约交易 - 唐老板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899;
            --bg: #0f172a; --bg-light: #1e293b; --text: #f8fafc; --text-muted: #94a3b8;
            --glass: rgba(30, 41, 59, 0.8); --border: rgba(255, 255, 255, 0.1);
            --success: #22c55e; --error: #ef4444; --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
            background-image: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* 头部 */
        .header {
            background: var(--glass); border: 1px solid var(--border); border-radius: 16px;
            padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px);
        }
        .header-top {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .coin-selector {
            display: flex; gap: 10px;
        }
        .coin-btn {
            padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text); border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .coin-btn.active {
            background: var(--primary); border-color: var(--primary);
        }
        .coin-btn:hover:not(.active) {
            background: rgba(255,255,255,0.1);
        }
        .price-display {
            text-align: right;
        }
        .current-price {
            font-size: 32px; font-weight: 700;
        }
        .price-change {
            font-size: 14px; margin-top: 5px;
        }
        .price-change.up { color: var(--success); }
        .price-change.down { color: var(--error); }
        
        .market-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px;
        }
        .stat-box {
            text-align: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px;
        }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .stat-value { font-size: 14px; font-weight: 600; }
        
        /* 主布局 */
        .main-layout {
            display: grid; grid-template-columns: 1fr 350px; gap: 20px;
        }
        
        /* K线图表 */
        .chart-container {
            background: var(--glass); border: 1px solid var(--border); border-radius: 16px;
            padding: 20px; backdrop-filter: blur(10px);
        }
        .chart-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .timeframe-selector {
            display: flex; gap: 5px;
        }
        .tf-btn {
            padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text-muted); border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .tf-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .chart-wrapper {
            position: relative; height: 400px;
        }
        
        /* 交易面板 */
        .trading-panel {
            background: var(--glass); border: 1px solid var(--border); border-radius: 16px;
            padding: 20px; backdrop-filter: blur(10px); height: fit-content;
        }
        .panel-title {
            font-size: 18px; font-weight: 600; margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .balance-display {
            background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 20px;
        }
        .balance-label { font-size: 12px; color: var(--text-muted); }
        .balance-value { font-size: 24px; font-weight: 700; margin-top: 5px; }
        .balance-value span { font-size: 14px; color: var(--text-muted); margin-left: 5px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted);
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 14px;
        }
        
        .leverage-display {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-bottom: 20px;
        }
        .leverage-value { font-weight: 600; color: var(--warning); }
        
        .trade-buttons {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }
        .btn-long {
            padding: 15px; background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-short {
            padding: 15px; background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-long:hover, .btn-short:hover {
            transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        /* 持仓列表 */
        .positions-section {
            margin-top: 20px;
        }
        .section-title {
            font-size: 16px; font-weight: 600; margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .position-item {
            background: rgba(255,255,255,0.03); border-radius: 10px; padding: 15px; margin-bottom: 10px;
            border-left: 4px solid transparent;
        }
        .position-item.long { border-left-color: var(--success); }
        .position-item.short { border-left-color: var(--error); }
        .position-header {
            display: flex; justify-content: space-between; margin-bottom: 10px;
        }
        .position-type {
            font-weight: 600; font-size: 14px;
        }
        .position-type.long { color: var(--success); }
        .position-type.short { color: var(--error); }
        .position-pnl {
            font-weight: 600; font-size: 14px;
        }
        .position-pnl.positive { color: var(--success); }
        .position-pnl.negative { color: var(--error); }
        .position-details {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: var(--text-muted);
        }
        .close-btn-small {
            width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid var(--border);
            color: var(--text); border-radius: 6px; cursor: pointer; margin-top: 10px; font-size: 12px;
        }
        .close-btn-small:hover { background: rgba(255,255,255,0.2); }
        
        .empty-state {
            text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px;
        }
        
        /* 深度图 */
        .depth-container {
            margin-top: 20px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px;
        }
        .depth-title { font-size: 14px; color: var(--text-muted); margin-bottom: 15px; }
        .depth-bars {
            display: flex; flex-direction: column; gap: 2px; font-size: 12px;
        }
        .depth-row {
            display: flex; align-items: center; height: 24px; position: relative;
        }
        .depth-bar {
            position: absolute; height: 100%; opacity: 0.3;
        }
        .depth-bar.bid { right: 50%; background: var(--success); }
        .depth-bar.ask { left: 50%; background: var(--error); }
        .depth-price {
            width: 50%; text-align: center; position: relative; z-index: 1;
        }
        .depth-price.bid { color: var(--success); padding-right: 10px; text-align: right; }
        .depth-price.ask { color: var(--error); padding-left: 10px; text-align: left; }
        
        @media (max-width: 968px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <div class="coin-selector">
                    <button class="coin-btn active" onclick="switchCoin('BTC')">BTC/USDT</button>
                    <button class="coin-btn" onclick="switchCoin('ETH')">ETH/USDT</button>
                    <button class="coin-btn" onclick="switchCoin('SOL')">SOL/USDT</button>
                </div>
                <div class="price-display">
                    <div class="current-price" id="currentPrice">$67,245.00</div>
                    <div class="price-change up" id="priceChange">+2.45% ▲</div>
                </div>
            </div>
            <div class="market-stats">
                <div class="stat-box">
                    <div class="stat-label">24h 最高</div>
                    <div class="stat-value" id="high24h">$68,120.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">24h 最低</div>
                    <div class="stat-value" id="low24h">$65,890.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">24h 成交量</div>
                    <div class="stat-value" id="volume24h">12.5K BTC</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">资金费率</div>
                    <div class="stat-value" style="color: var(--success);">+0.01%</div>
                </div>
            </div>
        </div>
        
        <!-- 主布局 -->
        <div class="main-layout">
            <!-- 左侧：K线图 -->
            <div class="chart-section">
                <div class="chart-container">
                    <div class="chart-header">
                        <h3 style="font-size: 16px;">K线图表</h3>
                        <div class="timeframe-selector">
                            <button class="tf-btn" onclick="switchTimeframe('1m')">1分</button>
                            <button class="tf-btn" onclick="switchTimeframe('5m')">5分</button>
                            <button class="tf-btn active" onclick="switchTimeframe('15m')">15分</button>
                            <button class="tf-btn" onclick="switchTimeframe('1h')">1小时</button>
                            <button class="tf-btn" onclick="switchTimeframe('4h')">4小时</button>
                            <button class="tf-btn" onclick="switchTimeframe('1d')">1天</button>
                        </div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="klineChart"></canvas>
                    </div>
                </div>
                
                <!-- 深度图 -->
                <div class="depth-container">
                    <div class="depth-title">订单深度</div>
                    <div class="depth-bars" id="depthBars">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
            
            <!-- 右侧：交易面板 -->
            <div class="trading-panel">
                <div class="panel-title">合约交易</div>
                
                <div class="balance-display">
                    <div class="balance-label">可用余额 (USDT)</div>
                    <div class="balance-value">
                        <span id="balance">10,000.00</span>
                        <span>USDT</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>保证金</label>
                    <input type="number" id="margin" placeholder="100" value="100">
                </div>
                
                <div class="form-group">
                    <label>杠杆倍数</label>
                    <select id="leverage">
                        <option value="1">1x</option>
                        <option value="5">5x</option>
                        <option value="10" selected>10x</option>
                        <option value="20">20x</option>
                        <option value="50">50x</option>
                        <option value="100">100x</option>
                    </select>
                </div>
                
                <div class="leverage-display">
                    <span>预估强平价格</span>
                    <span class="leverage-value" id="liqPrice">--</span>
                </div>
                
                <div class="trade-buttons">
                    <button class="btn-long" onclick="openPosition('long')">买入开多</button>
                    <button class="btn-short" onclick="openPosition('short')">卖出开空</button>
                </div>
                
                <!-- 持仓列表 -->
                <div class="positions-section">
                    <div class="section-title">当前持仓</div>
                    <div id="positionsList">
                        <div class="empty-state">暂无持仓</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        let currentCoin = 'BTC';
        let currentPrice = 67245;
        let balance = 10000;
        let positions = [];
        let chart;
        let priceUpdateInterval;
        
        // 生成K线数据
        function generateKlineData(count = 100) {
            const data = [];
            let price = currentPrice;
            const now = new Date();
            
            for (let i = count; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 15 * 60 * 1000);
                const volatility = 0.002;
                const change = (Math.random() - 0.5) * 2 * volatility;
                
                const open = price;
                const close = price * (1 + change);
                const high = Math.max(open, close) * (1 + Math.random() * 0.001);
                const low = Math.min(open, close) * (1 - Math.random() * 0.001);
                
                data.push({
                    x: time.getTime(),
                    o: open,
                    h: high,
                    l: low,
                    c: close
                });
                
                price = close;
            }
            
            return data;
        }
        
        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('klineChart').getContext('2d');
            const data = generateKlineData();
            
            chart = new Chart(ctx, {
                type: 'candlestick',
                data: {
                    datasets: [{
                        label: currentCoin + '/USDT',
                        data: data,
                        color: {
                            up: '#22c55e',
                            down: '#ef4444',
                            unchanged: '#94a3b8'
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const d = context.raw;
                                    return [`开: $${d.o.toFixed(2)}`, `高: $${d.h.toFixed(2)}`, `低: $${d.l.toFixed(2)}`, `收: $${d.c.toFixed(2)}`];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'hour' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        y: {
                            position: 'right',
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { 
                                color: '#94a3b8',
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // 更新价格
        function updatePrice() {
            const change = (Math.random() - 0.5) * 0.001;
            currentPrice = currentPrice * (1 + change);
            
            document.getElementById('currentPrice').textContent = '$' + currentPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            const changePercent = (Math.random() - 0.5) * 5;
            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = (changePercent >= 0 ? '+' : '') + changePercent.toFixed(2) + '% ' + (changePercent >= 0 ? '▲' : '▼');
            changeEl.className = 'price-change ' + (changePercent >= 0 ? 'up' : 'down');
            
            // 更新持仓盈亏
            updatePositions();
            
            // 实时更新图表
            if (Math.random() > 0.7) {
                const lastData = chart.data.datasets[0].data[chart.data.datasets[0].data.length - 1];
                lastData.c = currentPrice;
                lastData.h = Math.max(lastData.h, currentPrice);
                lastData.l = Math.min(lastData.l, currentPrice);
                chart.update('none');
            }
        }
        
        // 生成深度图
        function generateDepth() {
            const container = document.getElementById('depthBars');
            container.innerHTML = '';
            
            for (let i = 5; i >= 1; i--) {
                const price = currentPrice - i * 10;
                const amount = Math.random() * 5 + 0.5;
                const width = Math.min(amount * 10, 80);
                
                container.innerHTML += `
                    <div class="depth-row">
                        <div class="depth-bar bid" style="width: ${width}%"></div>
                        <div class="depth-price bid">${price.toFixed(2)}</div>
                        <div class="depth-price ask">${(currentPrice + i * 10).toFixed(2)}</div>
                        <div class="depth-bar ask" style="width: ${width}%"></div>
                    </div>
                `;
            }
        }
        
        // 开仓
        function openPosition(type) {
            const margin = parseFloat(document.getElementById('margin').value);
            const leverage = parseInt(document.getElementById('leverage').value);
            
            if (margin > balance) {
                alert('余额不足！');
                return;
            }
            
            balance -= margin;
            updateBalance();
            
            const position = {
                id: Date.now(),
                type: type,
                coin: currentCoin,
                entryPrice: currentPrice,
                margin: margin,
                leverage: leverage,
                size: margin * leverage,
                pnl: 0,
                pnlPercent: 0
            };
            
            positions.push(position);
            renderPositions();
        }
        
        // 平仓
        function closePosition(id) {
            const index = positions.findIndex(p => p.id === id);
            if (index === -1) return;
            
            const position = positions[index];
            balance += position.margin + position.pnl;
            updateBalance();
            
            positions.splice(index, 1);
            renderPositions();
        }
        
        // 更新持仓
        function updatePositions() {
            positions.forEach(pos => {
                const priceDiff = currentPrice - pos.entryPrice;
                const direction = pos.type === 'long' ? 1 : -1;
                pos.pnl = priceDiff * (pos.size / currentPrice) * direction;
                pos.pnlPercent = (pos.pnl / pos.margin) * 100;
            });
            renderPositions();
        }
        
        // 渲染持仓
        function renderPositions() {
            const container = document.getElementById('positionsList');
            
            if (positions.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无持仓</div>';
                return;
            }
            
            container.innerHTML = positions.map(pos => `
                <div class="position-item ${pos.type}">
                    <div class="position-header">
                        <span class="position-type ${pos.type}">${pos.type === 'long' ? '多' : '空'} ${pos.coin}/USDT ${pos.leverage}x</span>
                        <span class="position-pnl ${pos.pnl >= 0 ? 'positive' : 'negative'}">
                            ${pos.pnl >= 0 ? '+' : ''}${pos.pnl.toFixed(2)} USDT (${pos.pnlPercent >= 0 ? '+' : ''}${pos.pnlPercent.toFixed(2)}%)
                        </span>
                    </div>
                    <div class="position-details">
                        <div>开仓价: $${pos.entryPrice.toFixed(2)}</div>
                        <div>当前价: $${currentPrice.toFixed(2)}</div>
                        <div>保证金: ${pos.margin} USDT</div>
                        <div>仓位: ${pos.size.toFixed(4)} ${pos.coin}</div>
                    </div>
                    <button class="close-btn-small" onclick="closePosition(${pos.id})">平仓</button>
                </div>
            `).join('');
        }
        
        // 更新余额
        function updateBalance() {
            document.getElementById('balance').textContent = balance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        // 切换币种
        function switchCoin(coin) {
            currentCoin = coin;
            document.querySelectorAll('.coin-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 更新价格
            const prices = { BTC: 67245, ETH: 3456, SOL: 145 };
            currentPrice = prices[coin];
            
            // 重置图表
            chart.data.datasets[0].label = coin + '/USDT';
            chart.data.datasets[0].data = generateKlineData();
            chart.update();
            
            updatePrice();
            generateDepth();
        }
        
        // 切换时间周期
        function switchTimeframe(tf) {
            document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 重新生成数据
            chart.data.datasets[0].data = generateKlineData();
            chart.update();
        }
        
        // 初始化
        window.onload = function() {
            initChart();
            generateDepth();
            updateBalance();
            
            // 启动价格更新
            priceUpdateInterval = setInterval(updatePrice, 2000);
        };
    </script>
</body>
</html>
