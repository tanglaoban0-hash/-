<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.9">
<title>OKX模拟交易所</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
body{background:#0A0B10;color:#F5F5F5;font-size:14px}
.container{max-width:1400px;margin:0 auto;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center;background:#131620;padding:14px 18px;border-radius:12px;margin-bottom:10px}
.logo{font-size:22px;font-weight:700;color:#fff;letter-spacing:1px}
.logo span{color:#407BFF}
.user-area{display:flex;gap:8px;align-items:center}
.user-area button{background:#1B1F2E;border:none;color:#E5E7EB;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:14px}
.user-area button:hover{background:#407BFF;color:#fff}

.trade-pair{display:flex;gap:8px;background:#131620;padding:10px 14px;border-radius:12px;margin-bottom:10px;flex-wrap:wrap}
.trade-pair button{padding:6px 12px;background:#1B1F2E;border:none;border-radius:8px;color:#ccc;cursor:pointer}
.trade-pair button.active{background:#407BFF;color:#fff}

.main{display:grid;grid-template-columns:1fr 330px 390px;gap:10px}
@media(max-width:1024px){.main{grid-template-columns:1fr}}

.kline-box{background:#131620;border-radius:12px;padding:12px;height:520px}
#kline{width:100%;height:100%}

.depth-order{display:flex;flex-direction:column;gap:10px}
.depth-chart{background:#131620;border-radius:12px;padding:12px;height:250px}
#depth{width:100%;height:100%}
.order-book{background:#131620;border-radius:12px;padding:12px;height:260px;overflow-y:auto}
.book-title{font-size:14px;margin-bottom:8px}
.book-item{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#aaa}
.bid{color:#02C076}
.ask{color:#F24B4B}

.trade-box{background:#131620;border-radius:12px;padding:18px}
.tab{display:flex;gap:6px;margin-bottom:14px}
.tab-btn{flex:1;padding:10px;background:#1B1F2E;border:none;border-radius:8px;color:#aaa;cursor:pointer}
.tab-btn.active{background:#407BFF;color:#fff}
.input-item{margin-bottom:12px}
.input-item label{display:block;margin-bottom:5px;font-size:12px;color:#aaa}
.input-item input,.input-item select{width:100%;padding:10px;background:#1B1F2E;border:none;border-radius:8px;color:#fff;outline:none}
.btns{display:flex;gap:8px;margin-top:10px}
.btn-buy{flex:1;padding:12px;background:#02C076;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer}
.btn-sell{flex:1;padding:12px;background:#F24B4B;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer}

.asset{background:#131620;border-radius:12px;padding:16px;margin-top:10px}
.asset-title{font-size:14px;margin-bottom:10px}
.asset-row{display:flex;justify-content:space-between;padding:4px 0}
.asset-value{color:#407BFF;font-weight:500}
#recharge{margin-top:10px;width:100%;padding:10px;background:#407BFF;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer}

.bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.order-list,.position-list{background:#131620;border-radius:12px;padding:14px;max-height:320px;overflow-y:auto}
.list-title{font-size:14px;margin-bottom:10px}
.item{padding:8px;border-bottom:1px solid #1B1F2E;font-size:12px}
.item button{float:right;background:#407BFF;border:none;border-radius:4px;padding:2px 6px;color:#fff;font-size:11px;cursor:pointer}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:99}
.modal-card{background:#131620;border-radius:12px;padding:24px;width:360px}
.modal-card input{width:100%;padding:12px;background:#1B1F2E;border:none;border-radius:8px;color:#fff;margin-bottom:10px}
.modal-card button{width:100%;padding:12px;background:#407BFF;border:none;border-radius:8px;color:#fff;font-weight:bold}
.hide{display:none}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">OKX<span>模拟</span></div>
    <div class="user-area">
      <span id="userInfo">未登录</span>
      <button id="regBtn">注册</button>
      <button id="loginBtn">登录</button>
      <button id="logoutBtn" class="hide">退出</button>
    </div>
  </div>

  <div class="trade-pair">
    <button class="active" data-p="BTC">BTC/USDT</button>
    <button data-p="ETH">ETH/USDT</button>
    <button data-p="SOL">SOL/USDT</button>
  </div>

  <div class="asset">
    <div class="asset-title">资产概况</div>
    <div class="asset-row"><span>总资产 (USDT)</span><span id="total" class="asset-value">0.00</span></div>
    <div class="asset-row"><span>可用余额</span><span id="avail" class="asset-value">0.00</span></div>
    <div class="asset-row"><span>未实现盈亏</span><span id="pnl" class="asset-value">0.00</span></div>
    <div class="asset-row"><span>强平价格</span><span id="liq" class="asset-value">--</span></div>
    <button id="recharge">模拟充值 10000 USDT</button>
  </div>

  <div class="main">
    <div class="kline-box"><div id="kline"></div></div>
    <div class="depth-order">
      <div class="depth-chart"><div id="depth"></div></div>
      <div class="order-book">
        <div class="book-title">深度盘口</div>
        <div id="book"></div>
      </div>
    </div>
    <div class="trade-box">
      <div class="tab">
        <button class="tab-btn active" data-m="spot">现货</button>
        <button class="tab-btn" data-m="contract">永续合约</button>
      </div>
      <div class="input-item">
        <label>当前价格</label>
        <input type="number" id="price" readonly>
      </div>
      <div class="input-item">
        <label>交易数量</label>
        <input type="number" id="amount" value="0.001" step="0.001" min="0.0001">
      </div>
      <div class="input-item" id="levWrap" style="display:none">
        <label>杠杆倍数</label>
        <select id="lev">
          <option>1</option><option>5</option><option>10</option><option>20</option><option>50</option><option>100</option>
        </select>
      </div>
      <div class="input-item">
        <label>止盈价格</label>
        <input type="number" id="tp" placeholder="选填">
      </div>
      <div class="input-item">
        <label>止损价格</label>
        <input type="number" id="sl" placeholder="选填">
      </div>
      <div class="btns">
        <button class="btn-buy" id="buy">买入 / 开多</button>
        <button class="btn-sell" id="sell">卖出 / 开空</button>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="order-list">
      <div class="list-title">历史订单</div>
      <div id="orders"></div>
    </div>
    <div class="position-list">
      <div class="list-title">当前持仓</div>
      <div id="positions"></div>
    </div>
  </div>
</div>

<div class="modal hide" id="regModal">
  <div class="modal-card">
    <h3>注册</h3>
    <input id="regUser" placeholder="用户名">
    <input id="regPwd" type="password" placeholder="密码">
    <button id="doReg">注册</button>
  </div>
</div>

<div class="modal hide" id="loginModal">
  <div class="modal-card">
    <h3>登录</h3>
    <input id="loginUser" placeholder="用户名">
    <input id="loginPwd" type="password" placeholder="密码">
    <button id="doLogin">登录</button>
  </div>
</div>

<script>
let user = null
let current = "BTC"
let prices = {BTC:70200, ETH:3780, SOL:118}
let price = prices[current]
let mode = "spot"
let kdata = []

const kChart = echarts.init(document.getElementById("kline"))
const dChart = echarts.init(document.getElementById("depth"))

function initK() {
  let t = Date.now()
  kdata = []
  for (let i = 0; i < 60; i++) {
    let p = price + (Math.random() - 0.5) * 300
    kdata.push([t - (60 - i) * 60000, p, p + 200, p - 200, p + 100])
  }
  renderK()
}

function renderK() {
  kChart.setOption({
    grid: { left: 10, right: 10, top: 10, bottom: 10 },
    xAxis: { type: "time" },
    yAxis: { scale: true },
    series: [{ type: "candlestick", data: kdata }]
  })
}

function renderDepth() {
  let bids = [], asks = []
  for (let i = 1; i <= 12; i++) {
    bids.push([price - i * 25, Math.random() * 0.7 + 0.1])
    asks.push([price + i * 25, Math.random() * 0.7 + 0.1])
  }
  dChart.setOption({
    grid: { left: 5, right: 5, top: 5, bottom: 5 },
    xAxis: { type: "value" },
    yAxis: { type: "value" },
    series: [
      { type: "bar", name: "买", data: bids, itemStyle: { color: "#02C076" } },
      { type: "bar", name: "卖", data: asks, itemStyle: { color: "#F24B4B" } }
    ]
  })

  let book = document.getElementById("book")
  let html = ""
  for (let i = 10; i >= 1; i--) {
    html += `<div class="book-item"><span class="bid">${(price - i * 25).toFixed(1)}</span><span>${(Math.random() * 0.5 + 0.05).toFixed(3)}</span></div>`
  }
  html += `<div style="text-align:center;color:#407BFF;margin:6px 0">${price.toFixed(0)}</div>`
  for (let i = 1; i <= 10; i++) {
    html += `<div class="book-item"><span class="ask">${(price + i * 25).toFixed(1)}</span><span>${(Math.random() * 0.5 + 0.05).toFixed(3)}</span></div>`
  }
  book.innerHTML = html
}

function autoUpdate() {
  price = Math.max(price * 0.93, Math.min(price * 1.07, price + (Math.random() - 0.5) * 100))
  document.getElementById("price").value = price.toFixed(2)
  kdata.push([Date.now(), price, price + 150, price - 150, price + 50])
  if (kdata.length > 100) kdata.shift()
  renderK()
  renderDepth()
  calcPnl()
  refresh()
}

function loadUser() {
  let u = localStorage.getItem("okx_sim")
  if (u) {
    user = JSON.parse(u)
    refresh()
  }
}

function saveUser() {
  localStorage.setItem("okx_sim", JSON.stringify(user))
}

function refresh() {
  if (!user) return
  document.getElementById("userInfo").innerText = user.username
  document.getElementById("avail").innerText = user.asset.available.toFixed(2)
  calcPnl()
  renderOrders()
  renderPositions()
}

function calcPnl() {
  if (!user) return
  let totalPnl = 0
  user.positions.forEach(p => {
    let pl = p.dir === "long" ? (price - p.price) * p.amount * p.lev : (p.price - price) * p.amount * p.lev
    p.pnl = pl
    totalPnl += pl
  })
  user.pnl = totalPnl
  document.getElementById("pnl").innerText = totalPnl.toFixed(2)
  document.getElementById("total").innerText = (user.asset.available + totalPnl).toFixed(2)
  document.getElementById("liq").innerText = user.positions.length ? (price * 0.65).toFixed(0) : "--"
}

function renderOrders() {
  let dom = document.getElementById("orders")
  dom.innerHTML = user.orders.map((o, i) => `
  <div class="item">${o.time} ${o.type} ${o.dir}<br>${o.amount} @ ${o.price.toFixed(1)}</div>
  `).join("")
}

function renderPositions() {
  let dom = document.getElementById("positions")
  dom.innerHTML = user.positions.map((p, i) => `
  <div class="item">${p.dirText} ${p.amount} ${p.lev}x<br>盈亏: ${p.pnl.toFixed(2)}
  <button onclick="closePos(${i})">平仓</button></div>
  `).join("")
}

function closePos(index) {
  if (!user) return
  let p = user.positions[index]
  user.asset.available += p.amount * p.price / p.lev + p.pnl
  user.orders.unshift({
    time: new Date().toLocaleTimeString(),
    type: "平仓",
    dir: p.dirText,
    amount: p.amount,
    price: price
  })
  user.positions.splice(index, 1)
  saveUser()
  refresh()
}

document.getElementById("recharge").onclick = () => {
  if (!user) return alert("请先登录")
  user.asset.available += 10000
  saveUser()
  refresh()
}

document.querySelectorAll(".trade-pair button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".trade-pair button").forEach(x => x.classList.remove("active"))
    b.classList.add("active")
    current = b.dataset.p
    price = prices[current]
    initK()
    renderDepth()
  }
})

document.querySelectorAll(".tab-btn").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"))
    b.classList.add("active")
    mode = b.dataset.m
    document.getElementById("levWrap").style.display = mode === "contract" ? "block" : "none"
  }
})

document.getElementById("regBtn").onclick = () => {
  document.getElementById("regModal").classList.remove("hide")
}
document.getElementById("loginBtn").onclick = () => {
  document.getElementById("loginModal").classList.remove("hide")
}

document.getElementById("doReg").onclick = () => {
  let u = document.getElementById("regUser").value.trim()
  let p = document.getElementById("regPwd").value.trim()
  if (!u || !p) return alert("请输入完整")
  user = {
    username: u, pwd: p,
    asset: { available: 10000 },
    orders: [], positions: [], pnl: 0
  }
  saveUser()
  alert("注册成功")
  document.getElementById("regModal").classList.add("hide")
  refresh()
}

document.getElementById("doLogin").onclick = () => {
  let u = document.getElementById("loginUser").value.trim()
  let p = document.getElementById("loginPwd").value.trim()
  let local = localStorage.getItem("okx_sim")
  if (!local) return alert("未找到账号")
  let lu = JSON.parse(local)
  if (lu.username === u && lu.pwd === p) {
    user = lu
    alert("登录成功")
    document.getElementById("loginModal").classList.add("hide")
    refresh()
  } else {
    alert("账号或密码错误")
  }
}

document.getElementById("logoutBtn").onclick = () => {
  user = null
  localStorage.removeItem("okx_sim")
  document.getElementById("userInfo").innerText = "未登录"
}

document.getElementById("buy").onclick = () => {
  if (!user) return alert("请先登录")
  let amt = +document.getElementById("amount").value
  if (amt <= 0) return
  let lev = mode === "contract" ? +document.getElementById("lev").value : 1
  let cost = price * amt / lev
  if (user.asset.available < cost) return alert("余额不足")
  user.asset.available -= cost
  user.orders.unshift({
    time: new Date().toLocaleTimeString(),
    type: mode === "spot" ? "现货" : "合约",
    dir: "多",
    amount: amt,
    price: price
  })
  user.positions.push({
    dir: "long", dirText: "多", amount: amt, price: price, lev: lev, pnl: 0
  })
  saveUser()
  refresh()
}

document.getElementById("sell").onclick = () => {
  if (!user) return alert("请先登录")
  let amt = +document.getElementById("amount").value
  if (amt <= 0) return
  let lev = mode === "contract" ? +document.getElementById("lev").value : 1
  let cost = price * amt / lev
  if (user.asset.available < cost) return alert("余额不足")
  user.asset.available -= cost
  user.orders.unshift({
    time: new Date().toLocaleTimeString(),
    type: mode === "spot" ? "现货" : "合约",
    dir: "空",
    amount: amt,
    price: price
  })
  user.positions.push({
    dir: "short", dirText: "空", amount: amt, price: price, lev: lev, pnl: 0
  })
  saveUser()
  refresh()
}

initK()
renderDepth()
loadUser()
setInterval(autoUpdate, 2800)
window.onresize = () => { kChart.resize(); dChart.resize() }
</script>
</body>
</html>
